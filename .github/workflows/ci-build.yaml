name: CI Build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting CI pipeline"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint code
        run: |
          flake8 .

      - name: Run unit tests
        run: |
          nosetests

      - name: Complete job
        run: echo "CI pipeline completed successfully"